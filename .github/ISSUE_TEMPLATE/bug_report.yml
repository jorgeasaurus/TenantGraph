name: Bug report
description: Report a reproducible Tenant Graph issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Include enough detail to reproduce it in sample mode or with a real tenant.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the broken behavior and what you expected instead.
      placeholder: The graph shows..., but I expected...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List exact clicks, search terms, object types, and filters.
      placeholder: |
        1. Open sample tenant
        2. Search for ...
        3. Click ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Sign-in / MSAL
        - Microsoft Graph data
        - Three.js graph
        - Sidebar / details
        - Conditional Access sign-ins
        - Sample tenant
        - Documentation
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: Chrome 126 on macOS 15
  - type: textarea
    id: permissions
    attributes:
      label: Graph permissions or warnings
      description: Paste permission banners, Graph warnings, or console errors if relevant.
      render: text
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recording
      description: Drag in screenshots that show the problem.

